<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --md-primary:#6750A4;
  --md-primary-container:#EADDFF;
  --md-on-primary-container:#21005D;
  --md-surface:#FFFBFE;
  --md-surface-container:#F3EDF7;
  --md-surface-container-high:#ECE6F0;
  --md-outline:#CAC4D0;
  --md-outline-variant:#E7E0EC;
  --md-text:#1D1B20;
  --md-text-secondary:#49454F;
  --md-text-tertiary:#79747E;
  --md-shadow:0 1px 2px rgba(0,0,0,.14),0 2px 6px rgba(0,0,0,.08);
  --md-shadow-hover:0 2px 5px rgba(0,0,0,.16),0 6px 16px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,Roboto,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--md-text);
  background:#fffafe;
}
.wrap{
  padding:20px;
  max-width:1120px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,rgba(103,80,164,.06),rgba(103,80,164,0) 220px);
}
.tab-row{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px;
  margin-bottom:18px;
  background:var(--md-surface-container);
  border:1px solid var(--md-outline-variant);
  border-radius:999px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
}
.tab{
  min-height:36px;
  padding:8px 18px;
  border:0;
  border-radius:999px;
  background:transparent;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--md-text-secondary);
  transition:background .18s ease,color .18s ease,box-shadow .18s ease,transform .18s ease;
}
.tab:hover{background:rgba(103,80,164,.08)}
.tab.on{
  color:var(--md-on-primary-container);
  background:var(--md-primary-container);
  box-shadow:0 1px 3px rgba(0,0,0,.12);
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
  padding:14px 16px;
  background:var(--md-surface);
  border:1px solid var(--md-outline-variant);
  border-radius:24px;
  box-shadow:var(--md-shadow);
}
.nav{display:flex;align-items:center;gap:8px}
.plabel{
  min-width:128px;
  text-align:center;
  font-size:16px;
  font-weight:800;
  color:var(--md-text);
}
.btn{
  min-height:34px;
  padding:0 14px;
  border:1px solid var(--md-outline);
  border-radius:999px;
  background:var(--md-surface);
  color:var(--md-primary);
  font-size:12px;
  font-weight:800;
  cursor:pointer;
  transition:background .18s ease,box-shadow .18s ease,transform .18s ease,border-color .18s ease;
}
.btn:hover{background:rgba(103,80,164,.08);box-shadow:0 1px 3px rgba(0,0,0,.10);transform:translateY(-1px)}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{
  min-height:30px;
  padding:6px 11px;
  border-radius:999px;
  border:1px solid var(--md-outline);
  background:var(--md-surface);
  color:var(--md-text-secondary);
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease,border-color .16s ease;
}
.pill:hover{box-shadow:0 1px 4px rgba(0,0,0,.10);transform:translateY(-1px)}
.pill.on{border-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.14)}
.status{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin:0 0 12px 2px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--md-surface-container);
  color:var(--md-text-tertiary);
  font-size:11px;
  font-weight:700;
}
.status:before{
  content:"";
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--md-primary);
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:1px;
  background:var(--md-outline-variant);
  border:1px solid var(--md-outline-variant);
  border-radius:28px;
  overflow:hidden;
  box-shadow:var(--md-shadow);
}
.dh{
  padding:10px 6px;
  background:var(--md-surface-container);
  color:var(--md-text-secondary);
  font-size:11px;
  font-weight:800;
  text-align:center;
}
.dc{
  position:relative;
  min-height:112px;
  padding:8px;
  background:var(--md-surface);
  transition:background .18s ease,box-shadow .18s ease;
}
.dc:hover{background:linear-gradient(180deg,rgba(103,80,164,.045),rgba(103,80,164,.015)),var(--md-surface)}
.dc.today{background:linear-gradient(180deg,#FFF8F2,#FFF3EA)}
.dc.today:after{content:"";position:absolute;inset:0;border:2px solid rgba(103,80,164,.30);pointer-events:none}
.dc.empty{background:var(--md-surface-container);opacity:.55}
.dn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  height:24px;
  margin-bottom:6px;
  border-radius:50%;
  font-size:11px;
  font-weight:800;
  color:var(--md-text-secondary);
}
.dc.today .dn{background:var(--md-primary);color:white}
.chip{
  display:block;
  margin-bottom:4px;
  padding:4px 7px;
  border-radius:9px;
  font-size:10px;
  font-weight:900;
  line-height:1.35;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:default;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
  transition:filter .16s ease;
}
.chip:hover{filter:saturate(1.05)}
.tbadge{
  display:inline-flex;
  align-items:center;
  margin-left:3px;
  padding:1px 4px;
  border-radius:999px;
  background:rgba(255,255,255,.55);
  font-size:8px;
  font-weight:900;
}
.tl-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:2px;
  border-radius:24px;
  background:var(--md-surface-container);
  border:1px solid var(--md-outline-variant);
  box-shadow:var(--md-shadow);
}
.tl-dhead{
  position:sticky;
  top:0;
  z-index:1;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:18px;
  background:var(--md-surface-container-high);
  color:var(--md-text-secondary);
  font-size:12px;
  font-weight:900;
}
.tl-dhead.td{background:#FFF3EA;color:#6D4C41}
.tl-games{display:flex;flex-direction:column;gap:6px;padding:0 4px 4px}
.tl-game{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  border-left:4px solid transparent;
  border-radius:18px;
  background:var(--md-surface);
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
  transition:transform .16s ease,box-shadow .16s ease,background .16s ease;
}
.tl-game:hover{transform:translateY(-1px);box-shadow:var(--md-shadow-hover);background:linear-gradient(90deg,rgba(103,80,164,.04),transparent),var(--md-surface)}
.tl-game.open{box-shadow:var(--md-shadow-hover);background:linear-gradient(90deg,rgba(103,80,164,.07),transparent),var(--md-surface)}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 4px rgba(0,0,0,.04)}
.tl-name{min-width:50px;font-size:13px;font-weight:900;color:var(--md-text)}
.tl-opp{flex:1;min-width:120px;font-size:12px;font-weight:700;color:var(--md-text-secondary)}
.tl-times{font-size:11px;font-weight:700;color:var(--md-text-tertiary);text-align:right;line-height:1.45}
.tl-tag{min-width:48px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:900;text-align:center}
.no-games{
  padding:36px 16px;
  text-align:center;
  border-radius:24px;
  background:var(--md-surface-container);
  color:var(--md-text-tertiary);
  font-size:13px;
  font-weight:700;
}
.leg{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
  padding:14px 16px;
  border:1px solid var(--md-outline-variant);
  border-radius:24px;
  background:var(--md-surface);
  box-shadow:var(--md-shadow);
}
.li{
  display:flex;
  align-items:center;
  gap:7px;
  padding:4px 8px;
  border-radius:999px;
  background:var(--md-surface-container);
  font-size:11px;
  font-weight:800;
  color:var(--md-text-secondary);
}
.ld{width:12px;height:12px;border-radius:5px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.detail{
  margin-top:6px;
  padding:12px 14px;
  border-radius:18px;
  background:var(--md-surface-container);
  border:1px solid var(--md-outline-variant);
  font-size:12px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
}
.dr{
  display:flex;
  justify-content:space-between;
  gap:16px;
  padding:6px 0;
  border-bottom:1px solid var(--md-outline-variant);
}
.dr:last-child{border:none}
.dr span:first-child{color:var(--md-text-secondary);font-weight:800}
.dr span:last-child{color:var(--md-text);font-weight:800;text-align:right}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media (max-width:760px){
  .wrap{padding:14px}
  .topbar{border-radius:20px}
  .plabel{min-width:104px;font-size:14px}
  .cal-grid{border-radius:22px}
  .dc{min-height:92px;padding:6px}
  .chip{font-size:9px;padding:3px 5px}
  .tl-game{align-items:flex-start;gap:8px;padding:10px}
  .tl-times{min-width:64px}
  .tab{padding:8px 14px}
}
</style>
</head>

  // 수정사항 1: 초기 표시 월은 항상 오늘 기준 월
  let cm = new Date();
  cm.setDate(1);

  let active = new Set(PLAYERS.map(function(p){return p.pid;}));
  let mode = 'cal';
  let detailEl = null;

  function pad(n){return String(n).padStart(2,'0');}
  function key(d){return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());}
  function todayKey(){return key(new Date());}
  function player(pid){
    return PLAYERS.find(function(p){return p.pid === pid;}) || {color:'#ddd',text:'#111',short:'?',name:'?',team:''};
  }
  function gamesInMonth(){
    const ym = cm.getFullYear() + '-' + pad(cm.getMonth()+1);
    return GAMES.filter(function(g){return String(g.dk || '').indexOf(ym) === 0 && active.has(g.pid);});
  }
  function sw(m){
    mode = m;
    document.getElementById('tc').classList.toggle('on', m === 'cal');
    document.getElementById('tt').classList.toggle('on', m === 'tl');
    document.getElementById('vc').style.display = m === 'cal' ? 'block' : 'none';
    document.getElementById('vt').style.display = m === 'tl' ? 'block' : 'none';
    closeTimelineDetail();
    render();
  }
  function sh(n){
    cm.setMonth(cm.getMonth() + n);
    closeTimelineDetail();
    render();
  }
  // 수정사항 2: 오늘 버튼은 오늘 기준 월로 이동
  function gn(){
    cm = new Date();
    cm.setDate(1);
    closeTimelineDetail();
    render();
  }
  function renderFilters(){
    const fi = document.getElementById('fi');
    fi.innerHTML = PLAYERS.map(function(p){
      return '<button class="pill on" type="button" data-pid="' + p.pid + '" id="f_' + p.pid + '" style="background:' + p.color + ';color:' + p.text + '">' + p.short + '</button>';
    }).join('');

    fi.querySelectorAll('.pill').forEach(function(el){
      el.addEventListener('click', function(){
        tog(el.getAttribute('data-pid'));
      });
    });

    const lg = document.getElementById('lg');
    lg.innerHTML = PLAYERS.map(function(p){
      return '<div class="li"><span class="ld" style="background:' + p.color + '"></span>' + p.name + ' · ' + p.team + '</div>';
    }).join('');
  }
  function tog(pid){
    if(active.has(pid)) active.delete(pid);
    else active.add(pid);

    const p = player(pid);
    const el = document.getElementById('f_' + pid);

    if(el){
      const on = active.has(pid);
      el.classList.toggle('on', on);
      el.style.background = on ? p.color : 'transparent';
      el.style.color = on ? p.text : 'var(--md-text-secondary)';
    }

    closeTimelineDetail();
    render();
  }
  function renderCal(){
    const vc = document.getElementById('vc');
    const y = cm.getFullYear();
    const m = cm.getMonth();
    const first = new Date(y,m,1);
    const start = first.getDay();
    const last = new Date(y,m+1,0).getDate();
    const days = ['일','월','화','수','목','금','토'];
    const by = {};

    gamesInMonth().forEach(function(g){
      if(!by[g.dk]) by[g.dk] = [];
      by[g.dk].push(g);
    });

    let h = '<div class="cal-grid">';
    days.forEach(function(d){h += '<div class="dh">' + d + '</div>';});

    for(let i=0;i<start;i++) h += '<div class="dc empty"></div>';

    for(let d=1;d<=last;d++){
      const dt = new Date(y,m,d);
      const dk = key(dt);
      const isToday = dk === todayKey();

      h += '<div class="dc ' + (isToday ? 'today' : '') + '"><div class="dn">' + d + '</div>';

      (by[dk] || []).forEach(function(g){
        const p = player(g.pid);
        const vs = g.isHome ? 'vs ' + g.opp : '@ ' + g.opp;
        const tag = TAG_LABEL[g.tag] || '';
        const tb = tag ? '<span class="tbadge">' + tag + '</span>' : '';
        const title = g.name + ' ' + vs + ' · ' + g.time + ' · ' + g.sport;

        // 수정사항 3: 월간 캘린더에서는 상세 카드 펼침 기능 제거
        h += '<span class="chip" title="' + escapeAttr(title) + '" style="background:' + p.color + ';color:' + p.text + '">' + esc(g.short) + ' ' + esc(vs) + tb + '</span>';
      });

      h += '</div>';
    }

    h += '</div>';
    vc.innerHTML = h;
  }
  function renderTL(){
    const vt = document.getElementById('vt');
    const gs = gamesInMonth().slice().sort(function(a,b){
      return (a.dk + ' ' + a.time).localeCompare(b.dk + ' ' + b.time);
    });

    if(!gs.length){
      vt.innerHTML = '<div class="no-games">이 달에는 표시할 경기가 없어요.</div>';
      return;
    }

    const by = {};
    gs.forEach(function(g){
      if(!by[g.dk]) by[g.dk] = [];
      by[g.dk].push(g);
    });

    let h = '<div class="tl-list">';

    Object.keys(by).sort().forEach(function(dk){
      const dt = new Date(dk + 'T00:00:00Z');
      const dows = ['일','월','화','수','목','금','토'];

      h += '<div class="tl-dhead ' + (dk === todayKey() ? 'td' : '') + '">' + dk.substring(5).replace('-','/') + ' (' + dows[dt.getUTCDay()] + ')</div>';
      h += '<div class="tl-games">';

      by[dk].forEach(function(g){
        const p = player(g.pid);
        const vs = g.isHome ? 'vs ' + g.opp : '@ ' + g.opp;
        const tag = TAG_LABEL[g.tag] || '';
        const tagHtml = tag ? '<div class="tl-tag" style="background:' + (TAG_BG[g.tag] || '#eee') + ';color:' + (TAG_TC[g.tag] || '#333') + '">' + tag + '</div>' : '';
        const localLine = g.localTime ? '<div style="font-size:10px;color:var(--md-text-tertiary)">현지 ' + esc(g.localTime) + '</div>' : '';
        const data = encodeURIComponent(JSON.stringify(g));

        h += '<div class="tl-game" data-game="' + data + '" style="border-left-color:' + p.color + '">';
        h += '<div class="tl-dot" style="background:' + p.color + '"></div>';
        h += '<div class="tl-name">' + esc(g.short) + '</div>';
        h += '<div class="tl-opp">' + esc(vs) + ' · ' + esc(g.sport) + '</div>';
        h += '<div class="tl-times"><div>' + esc(g.time) + '</div>' + localLine + '</div>';
        h += tagHtml;
        h += '</div>';
      });

      h += '</div>';
    });

    h += '</div>';
    vt.innerHTML = h;
  }
  function esc(v){
    return String(v ?? '').replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function escapeAttr(v){
    return esc(v).replace(/"/g,'&quot;');
  }
  function detailHtml(g){
    const vs = g.isHome ? 'vs ' + g.opp + ' (홈)' : '@ ' + g.opp + ' (원정)';
    const tl = TAG_LABEL[g.tag] || '일반';

    const rows = [
      ['선수', g.name],
      ['경기', vs],
      ['리그', g.sport],
      ['KST 시각', g.time],
      ['현지 시각', g.localTime || '-'],
      ['상태', g.status || '-'],
      ['타이밍', tl],
      ['수집일시', g.collectedAt || '-']
    ];

    return '<div class="detail">' + rows.map(function(r){
      return '<div class="dr"><span>' + esc(r[0]) + '</span><span>' + esc(r[1]) + '</span></div>';
    }).join('') + '</div>';
  }
  function closeTimelineDetail(){
    document.querySelectorAll('.detail').forEach(function(x){x.remove();});
    document.querySelectorAll('.tl-game.open').forEach(function(x){x.classList.remove('open');});
    detailEl = null;
  }
  function readGame(el){
    try{
      return JSON.parse(decodeURIComponent(el.getAttribute('data-game') || ''));
    }catch(e){
      return null;
    }
  }
  function bindTimelineClickDetails(){
    document.querySelectorAll('.tl-game').forEach(function(el){
      if(el.dataset.clickBound === '1') return;
      el.dataset.clickBound = '1';

      // 수정사항 4: 타임라인에서는 hover가 아니라 클릭 시 상세 카드 표시
      el.addEventListener('click', function(ev){
        ev.preventDefault();

        const alreadyOpen = detailEl === el;
        closeTimelineDetail();

        if(alreadyOpen) return;

        const g = readGame(el);
        if(!g) return;

        detailEl = el;
        el.classList.add('open');
        el.insertAdjacentHTML('afterend', detailHtml(g));
      });
    });
  }
  function render(){
    document.getElementById('pl').innerText = cm.getFullYear() + '. ' + pad(cm.getMonth()+1);
    renderCal();
    renderTL();
    bindTimelineClickDetails();
  }

  document.getElementById('tc').addEventListener('click', function(){sw('cal');});
  document.getElementById('tt').addEventListener('click', function(){sw('tl');});
  document.getElementById('prevBtn').addEventListener('click', function(){sh(-1);});
  document.getElementById('nextBtn').addEventListener('click', function(){sh(1);});
  document.getElementById('todayBtn').addEventListener('click', function(){gn();});

  renderFilters();
  render();
})();
</script>
</body>
</html>
