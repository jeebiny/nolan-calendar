body{font-family:var(--font-sans,Inter,Roboto,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif);color:var(--color-text-primary,var(--md-text));background:var(--color-background-primary,var(--md-surface))}

.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

let active=new Set(['all']), view='cal', offset=0, detailEl=null;
function kstNow(){return new Date(Date.now()+9*3600000);}
function fmtD(d){return d.toISOString().substring(0,10);}

function getRange(){
  const now=kstNow();
  if(view==='cal'){
    const y=now.getUTCFullYear(),m=now.getUTCMonth()+offset;
    const d=new Date(Date.UTC(y,m,1));
    const last=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,0));
    return{start:fmtD(d),end:fmtD(last),year:d.getUTCFullYear(),month:d.getUTCMonth()+1,firstDay:d.getUTCDay(),days:last.getUTCDate()};
  } else {
    const base=new Date(now); base.setUTCDate(now.getUTCDate()+offset*14);
    const dow=base.getUTCDay(), mon=new Date(base);
    mon.setUTCDate(base.getUTCDate()-(dow===0?6:dow-1));
    const sun=new Date(mon); sun.setUTCDate(mon.getUTCDate()+13);
    return{start:fmtD(mon),end:fmtD(sun)};
  }
}

function filtered(){
  const r=getRange();
  return (active.has('all')?GAMES:GAMES.filter(g=>active.has(g.pid)))
    .filter(g=>g.dk>=r.start&&g.dk<=r.end);
}

function renderFilters(){
  const pids=[...new Set(GAMES.map(g=>g.pid))];
  const el=document.getElementById('fi');
  let h=`<button class="pill${active.has('all')?' on':''}" style="${active.has('all')?'background:#E8E0D0;color:#5A4A30;border-color:#D0C8B8':''}" onclick="tog('all')">전체</button>`;
  PLAYERS.filter(p=>pids.includes(p.pid)).forEach(p=>{
    const on=active.has(p.pid);
    h+=`<button class="pill${on?' on':''}" style="${on?`background:${p.color};color:${p.text};border-color:${p.color}`:''}" onclick="tog('${p.pid}')">${p.name}</button>`;
  });
  el.innerHTML=h;
}

function tog(id){
  if(id==='all'){active=new Set(['all']);}
  else{active.delete('all');active.has(id)?active.delete(id):active.add(id);if(!active.size)active.add('all');}
  renderFilters();render();
}

function render(){view==='cal'?renderCal():renderTL();renderLeg();}

function renderCal(){
  document.getElementById('vt').style.display='none';
  const cv=document.getElementById('vc'); cv.style.display='';
  const r=getRange();
  document.getElementById('pl').textContent=`${r.year}년 ${r.month}월`;
  const todayKey=kstNow().toISOString().substring(0,10);
  const fgames=filtered(), dayMap={};
  fgames.forEach(g=>{if(!dayMap[g.dk])dayMap[g.dk]=[];dayMap[g.dk].push(g);});
  const P=PLAYERS.reduce((a,p)=>{a[p.pid]=p;return a;},{});
  const wdays=['월','화','수','목','금','토','일'];
  let h=wdays.map(d=>`<div class="dh">${d}</div>`).join('');
  const blank=r.firstDay===0?6:r.firstDay-1;
  for(let i=0;i<blank;i++)h+=`<div class="dc empty"></div>`;
  for(let day=1;day<=r.days;day++){
    const key=`${r.year}-${String(r.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=key===todayKey;
    const gs=dayMap[key]||[];
    const chips=gs.slice(0,4).map(g=>{
      const p=P[g.pid]||{color:'#ccc',text:'#333'};
      const vs=g.isHome?`vs ${g.opp}`:`@ ${g.opp}`;
      const tbl=TAG_LABEL[g.tag];
      const tb=tbl?`<span class="tbadge" style="background:${TAG_BG[g.tag]};color:${TAG_TC[g.tag]}">${tbl}</span>`:'';
      const title=`${g.name} ${vs} | KST ${g.time}${g.localTime?' / 현지 '+g.localTime:''}`;
      return `<span class="chip" title="${title}" style="background:${p.color};color:${p.text}" onmouseenter="showDetail(this,${JSON.stringify(JSON.stringify(g))},true)" onmouseleave="hideDetail(this)" onclick="showDetail(this,${JSON.stringify(JSON.stringify(g))},false)">${g.short} ${vs}${tb}</span>`;
    }).join('');
    const more=gs.length>4?`<span style="font-size:9px;color:var(--color-text-tertiary)">+${gs.length-4}</span>`:'';
    h+=`<div class="dc${isToday?' today':''}"><div class="dn">${day}</div>${chips}${more}</div>`;
  }
  const endBlank=(7-(blank+r.days)%7)%7;
  for(let i=0;i<endBlank;i++)h+=`<div class="dc empty"></div>`;
  cv.innerHTML=`<div class="cal-grid">${h}</div>`;
}

function renderTL(){
  document.getElementById('vc').style.display='none';
  const tv=document.getElementById('vt'); tv.style.display='';
  const r=getRange();
  document.getElementById('pl').textContent=`${r.start.substring(5).replace('-','/')} ~ ${r.end.substring(5).replace('-','/')}`;
  const todayKey=kstNow().toISOString().substring(0,10);
  const fgames=filtered(), dayMap={};
  fgames.forEach(g=>{if(!dayMap[g.dk])dayMap[g.dk]=[];dayMap[g.dk].push(g);});
  const P=PLAYERS.reduce((a,p)=>{a[p.pid]=p;return a;},{});
  const DOW=['일','월','화','수','목','금','토'];
  const cur=new Date(r.start+'T00:00:00Z');
  const end=new Date(r.end+'T00:00:00Z');
  let h='<div class="tl-list">';
  while(cur<=end){
    const key=fmtD(cur);
    const gs=dayMap[key]||[];
    if(gs.length>0){
      const isToday=key===todayKey;
      const dateStr=`${cur.getUTCMonth()+1}월 ${cur.getUTCDate()}일 (${DOW[cur.getUTCDay()]})`;
      h+=`<div><div class="tl-dhead${isToday?' td':''}"><span>${dateStr}</span>${isToday?'<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:#F3DFCD;color:#7A5C3A">오늘</span>':''}</div><div class="tl-games">`;
      gs.forEach(g=>{
        const p=P[g.pid]||{color:'#ccc',text:'#333'};
        const vs=g.isHome?`vs ${g.opp}`:`@ ${g.opp}`;
        const tl=TAG_LABEL[g.tag];
        const tagHtml=tl?`<span class="tl-tag" style="background:${TAG_BG[g.tag]};color:${TAG_TC[g.tag]}">${tl}</span>`:'<span></span>';
        const localLine=g.localTime?`<div style="font-size:10px;color:var(--color-text-tertiary)">현지 ${g.localTime}</div>`:'';
        h+=`<div class="tl-game" style="border-left-color:${p.color}" onmouseenter="showDetail(this,${JSON.stringify(JSON.stringify(g))},true)" onmouseleave="hideDetail(this)" onclick="showDetail(this,${JSON.stringify(JSON.stringify(g))},false)">
          <div class="tl-dot" style="background:${p.color}"></div>
          <div class="tl-name" style="color:${p.text}">${g.name}</div>
          <div class="tl-opp">${vs} <span style="font-size:11px;color:var(--color-text-tertiary)">${g.team}</span></div>
          ${tagHtml}
          <div class="tl-times"><div>KST ${g.time}</div>${localLine}</div>
        </div>`;
      });
      h+='</div></div>';
    }
    cur.setUTCDate(cur.getUTCDate()+1);
  }
  if(!Object.keys(dayMap).length) h+=`<div class="no-games">이 기간에 경기가 없습니다</div>`;
  h+='</div>';
  tv.innerHTML=h;
}

function renderLeg(){
  const pids=[...new Set(filtered().map(g=>g.pid))];
  const el=document.getElementById('lg');
  const seen=new Set();
  const items=[];
  pids.forEach(pid=>{
    if(seen.has(pid))return; seen.add(pid);
    const p=PLAYERS.find(x=>x.pid===pid);
    if(p) items.push(`<div class="li"><div class="ld" style="background:${p.color}"></div><span style="color:${p.text}">${p.name}</span></div>`);
  });
  el.innerHTML=items.join('');
}


function esc(v){
  return String(v ?? '').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function showDetail(el,js,force){
  const g=JSON.parse(js);

  if(!force && detailEl===el){
    hideDetail(el);
    return;
  }

  document.querySelectorAll('.detail').forEach(function(x){x.remove();});
  detailEl=el;

  const vs=g.isHome ? 'vs '+g.opp+' (홈)' : '@ '+g.opp+' (원정)';
  const tl=TAG_LABEL[g.tag]||'일반';

  const rows=[
    ['선수',g.name],
    ['경기',vs],
    ['리그',g.sport],
    ['KST 시각',g.time],
    ['현지 시각',g.localTime||'-'],
    ['상태',g.status||'-'],
    ['타이밍',tl],
    ['수집일시',g.collectedAt||'-']
  ];

  const html='<div class="detail">'+rows.map(function(r){
    return '<div class="dr"><span>'+esc(r[0])+'</span><span>'+esc(r[1])+'</span></div>';
  }).join('')+'</div>';

  el.insertAdjacentHTML('afterend',html);
}

function hideDetail(el){
  if(!el || detailEl===el){
    document.querySelectorAll('.detail').forEach(function(x){x.remove();});
    detailEl=null;
  }
}


function sw(t){
  view=t;offset=0;
  document.getElementById('tc').className='tab'+(t==='cal'?' on':'');
  document.getElementById('tt').className='tab'+(t==='tl'?' on':'');
  render();
}
function sh(d){offset+=d;render();}
function gn(){offset=0;render();}

renderFilters();render();
</script>
